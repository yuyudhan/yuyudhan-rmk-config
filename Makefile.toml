# cargo-make build chain for the yuyudhan-1 RMK firmware.
# All build outputs go into ./build/ (a gitignored staging dir), NEVER the repo
# root. `just build` then moves the final .uf2(s) into firmware/<datetime>/.
# `build/` holds throwaway staging; firmware/<datetime>/ holds kept snapshots.

[tasks.install-llvm-tools]
install_crate = { rustup_component_name = "llvm-tools" }

[tasks.flip-link]
install_crate = { crate_name = "flip-link", binary = "flip-link", test_arg = ["-h"] }

# Ensure the staging dir exists before objcopy writes into it (objcopy will not
# create parent directories on its own).
[tasks.prepare-build-dir]
command = "mkdir"
args = ["-p", "build"]

[tasks.objcopy-central]
install_crate = { crate_name = "cargo-binutils", binary = "cargo", test_arg = [
    "objcopy",
    "--help",
] }
command = "cargo"
args = [
    "objcopy",
    "--release",
    "--bin",
    "central",
    "--",
    "-O",
    "ihex",
    "build/rmk-central.hex",
]
dependencies = ["install-llvm-tools", "flip-link", "prepare-build-dir"]

[tasks.objcopy-peripheral]
install_crate = { crate_name = "cargo-binutils", binary = "cargo", test_arg = [
    "objcopy",
    "--help",
] }
command = "cargo"
args = [
    "objcopy",
    "--release",
    "--bin",
    "peripheral",
    "--",
    "-O",
    "ihex",
    "build/rmk-peripheral.hex",
]
dependencies = ["install-llvm-tools", "flip-link", "prepare-build-dir"]

[tasks.uf2-central]
install_crate = { crate_name = "cargo-hex-to-uf2", binary = "cargo", test_arg = [
    "hex-to-uf2",
    "--help",
] }
command = "cargo"
args = [
    "hex-to-uf2",
    "--input-path",
    "build/rmk-central.hex",
    "--output-path",
    "build/rmk-central.uf2",
    "--family",
    "nrf52840",
]
dependencies = ["objcopy-central"]

[tasks.uf2-peripheral]
install_crate = { crate_name = "cargo-hex-to-uf2", binary = "cargo", test_arg = [
    "hex-to-uf2",
    "--help",
] }
command = "cargo"
args = [
    "hex-to-uf2",
    "--input-path",
    "build/rmk-peripheral.hex",
    "--output-path",
    "build/rmk-peripheral.uf2",
    "--family",
    "nrf52840",
]
dependencies = ["objcopy-peripheral"]

[tasks.uf2]
dependencies = ["uf2-central", "uf2-peripheral"]
