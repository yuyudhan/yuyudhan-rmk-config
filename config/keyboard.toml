# yuyudhan-1 keyboard config

[keyboard]
name = "yuyudhan-1"
product_name = "yuyudhan-1"
vendor_id = 0x4c4b
product_id = 0x7975
manufacturer = "yuyudhan"
chip = "nrf52840"

[rmk]
ble_profiles_num = 4
split_central_sleep_timeout_seconds = 300

[storage]
# clear_storage = true wipes ALL storage every boot — see docs before enabling.
clear_storage = false

[ble]
enabled = true
battery_adc_pin = "vddh"
adc_divider_measured = 2000
adc_divider_total = 2806
default_tx_power = 8

[host]
unlock_keys = [[3, 3], [3, 4]]

[layout]
rows = 4
cols = 12
layers = 8
matrix_map = """
(0,0,L) (0,1,L) (0,2,L) (0,3,L) (0,4,L) (0,5,L)   (0,6,R) (0,7,R) (0,8,R) (0,9,R) (0,10,R) (0,11,R)
(1,0,L) (1,1,L) (1,2,L) (1,3,L) (1,4,L) (1,5,L)   (1,6,R) (1,7,R) (1,8,R) (1,9,R) (1,10,R) (1,11,R)
(2,0,L) (2,1,L) (2,2,L) (2,3,L) (2,4,L) (2,5,L)   (2,6,R) (2,7,R) (2,8,R) (2,9,R) (2,10,R) (2,11,R)
                (3,3,L) (3,4,L) (3,5,L)   (3,6,R) (3,7,R) (3,8,R)
"""

# Layer 0 — BASE (QWERTY + HRM)
[[layer]]
name = "BASE"
keys = """
MT(No, LGui | LCtrl | LAlt | LShift, TLI) Q                W                E                R                T                    Y                U                I                O                P                MT(No, LGui | LCtrl | LAlt | LShift, TLI)
MT(No, LGui | LCtrl | LAlt, TLI) MT(A, LGui, HRM) MT(S, LAlt, HRM) MT(D, LCtrl, HRM) MT(F, LShift, HRM) G                 H                MT(J, RShift, HRM) MT(K, RCtrl, HRM) MT(L, RAlt, HRM) MT(Quote, RGui, HRM) MT(No, LGui | LCtrl | LAlt, TLI)
MT(No, LCtrl | LAlt, TLI) Z                X                C                V                B                    N                M                Comma            Dot              Slash            MT(No, LCtrl | LAlt, TLI)
                                  LT(3, Escape, TL) LT(1, Space, TL) LT(6, Tab, TL)      LT(4, Enter, TL) LT(2, Backspace, TL) LT(5, Delete, TL)
"""

# Layer 1 — NAV
[[layer]]
name = "NAV"
keys = """
_______ No   No   No   No   No                        No        End       Home      No        CapsLock _______
_______ LGui LAlt LCtrl LShift No                     Left      Down      Up        Right     CapsWordToggle _______
No   No   No   No   No   No                        No        PageDown  PageUp    No        Insert   No
               No   No   No                   Enter     Backspace Delete
"""

# Layer 2 — NUM
[[layer]]
name = "NUM"
keys = """
_______ LeftBracket Kc7 Kc8 Kc9 RightBracket          No No No No No _______
_______ Semicolon   Kc4 Kc5 Kc6 Equal                 No RShift RCtrl RAlt RGui _______
No       Grave       Kc1 Kc2 Kc3 Backslash             No No No No No No
                Dot Kc0 Minus                 No No No
"""

# Layer 3 — MEDIA
[[layer]]
name = "MEDIA"
keys = """
_______ No   No   No   No   No                        WM(Q, LCtrl | LGui) BrightnessDown BrightnessUp User6 User9 _______
_______ LGui LAlt LCtrl LShift No                      TG(7)        AudioVolDown   AudioVolUp   User0          User1 _______
No   No   No   No   No   No                         User7        MediaNextTrack MediaPrevTrack User2         User3 No
               No   No   No                    MediaStop    MediaPlayPause AudioMute
"""

# Layer 4 — SYM
[[layer]]
name = "SYM"
keys = """
_______ SHIFTED(LeftBracket) SHIFTED(Kc7) SHIFTED(Kc8) SHIFTED(Kc9) SHIFTED(RightBracket)   No No No No No _______
_______ SHIFTED(Semicolon)   SHIFTED(Kc4) SHIFTED(Kc5) SHIFTED(Kc6) SHIFTED(Equal)          No RShift RCtrl RAlt RGui _______
No       SHIFTED(Grave)       SHIFTED(Kc1) SHIFTED(Kc2) SHIFTED(Kc3) SHIFTED(Backslash)      No No No No No No
                     SHIFTED(Kc9) SHIFTED(Kc0) SHIFTED(Minus)                       No No No
"""

# Layer 5 — FUN
[[layer]]
name = "FUN"
keys = """
_______ F12 F7 F8 F9 WM(Kc4, LShift | LGui)             No No No No No _______
_______ F11 F4 F5 F6 No                                 No RShift RCtrl RAlt RGui _______
No       F10 F1 F2 F3 No                                 No No No No No No
           Menu Space Tab                       No No No
"""

# Layer 6 — MOUSE
[[layer]]
name = "MOUSE"
keys = """
_______ No   No   No   No   No                          No             No             No             No             No _______
_______ LGui LAlt LCtrl LShift No                        MouseLeft      MouseDown      MouseUp        MouseRight     No _______
No   No   No   No   No   No                           MouseWheelLeft MouseWheelDown MouseWheelUp   MouseWheelRight No No
               MouseBtn4 MouseBtn5 No             MouseBtn1      MouseBtn3      MouseBtn2
"""

# Layer 7 — DISPOFF (toggle via TG(7) on MEDIA; blanks both OLEDs)
[[layer]]
name = "DISPOFF"
keys = """
_______ _______ _______ _______ _______ _______        _______ _______ _______ _______ _______ _______
_______ _______ _______ _______ _______ _______        _______ _______ _______ _______ _______ _______
_______ _______ _______ _______ _______ _______        _______ _______ _______ _______ _______ _______
                _______ _______ _______         _______ _______ _______
"""

# Tap-hold ("morse") tuning — every tap-hold key is tagged HRM/TL/TLI.
# prior_idle_time is global-only; it powers flow tap on HRM keys.
[behavior.morse]
enable_flow_tap = true
prior_idle_time = "150ms"

[behavior.morse.profiles]
HRM = { enable_flow_tap = true, permissive_hold = true, unilateral_tap = true, hold_timeout = "250ms", gap_timeout = "200ms" }
TL = { enable_flow_tap = false, permissive_hold = true, hold_timeout = "200ms", gap_timeout = "200ms" }
TLI = { enable_flow_tap = false, hold_on_other_press = true, hold_timeout = "200ms", gap_timeout = "200ms" }

[split]
connection = "ble"

[split.central]
rows = 4
cols = 6
row_offset = 0
col_offset = 0
ble_addr = [0x18, 0xe2, 0x21, 0x80, 0xc0, 0xc7]
battery_adc_pin = "vddh"
adc_divider_measured = 2000
adc_divider_total = 2806

[split.central.matrix]
matrix_type = "normal"
debouncer = "fast"
row_pins = ["P0_22", "P0_24", "P1_00", "P0_11"]
col_pins = ["P0_31", "P0_29", "P0_02", "P1_15", "P1_13", "P1_11"]

[split.central.display]
driver = "ssd1306"
size = "128x32"
rotation = 90
renderer = "crate::status::StatusRenderer"

[split.central.display.protocol.i2c]
instance = "TWISPI0"
sda = "P0_17"
scl = "P0_20"

[[split.peripheral]]
rows = 4
cols = 6
row_offset = 0
col_offset = 6
ble_addr = [0x7e, 0xfe, 0x73, 0x9e, 0x66, 0xe3]
battery_adc_pin = "vddh"
adc_divider_measured = 2000
adc_divider_total = 2806

[split.peripheral.matrix]
matrix_type = "normal"
debouncer = "fast"
row_pins = ["P0_22", "P0_24", "P1_00", "P0_11"]
col_pins = ["P1_11", "P1_13", "P1_15", "P0_02", "P0_29", "P0_31"]

[split.peripheral.display]
driver = "ssd1306"
size = "128x32"
rotation = 90
renderer = "crate::trishul::TrishulRenderer"
render_interval = 400

[split.peripheral.display.protocol.i2c]
instance = "TWISPI0"
sda = "P0_17"
scl = "P0_20"
