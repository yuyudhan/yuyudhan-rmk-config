# ============================================================================
# yuyudhan-1 — Corne split, 2x nice!nano v2 (nRF52840), wireless BLE.
#   Left half  = central    (talks USB/BLE to the host, owns the keymap, runs Vial)
#   Right half = peripheral (talks BLE to the central only)
#
# This file IS the firmware's keymap: it is read at COMPILE TIME by the RMK
# proc-macro (via KEYBOARD_TOML_PATH in .cargo/config.toml). Editing it does
# nothing until you `just build both` and reflash the CENTRAL (left) half.
# The peripheral only needs reflashing when firmware code changes.
#
# Pin map = ZMK `corne` shield + nice!nano pro_micro mapping (verified 1:1).
# ============================================================================

# ----------------------------------------------------------------------------
# Identity: what your computer sees in its USB / Bluetooth device list.
# vendor_id/product_id are the USB VID:PID pair; hosts and Vial use them to
# recognize the board. Changing them makes the OS treat it as a *new* device
# (fresh permissions/settings on some OSes).
# ----------------------------------------------------------------------------
[keyboard]
name = "yuyudhan-1"
product_name = "yuyudhan-1"
vendor_id = 0x4c4b
product_id = 0x7975
manufacturer = "yuyudhan"
chip = "nrf52840"

# ----------------------------------------------------------------------------
# ble_profiles_num — how many host "slots" the keyboard remembers (laptop,
# desktop, tablet, phone). Each slot stores one Bluetooth bond.
#
# It also DEFINES the meaning of the User0..User7 keycodes on the MEDIA layer:
# with N profiles, User0..User(N-1) select a profile, then UserN = next,
# User(N+1) = previous, User(N+2) = clear bond, User(N+3) = toggle USB/BLE.
# MUST stay 4 here, so: User0-3 = BT0-BT3, User4 = next, User5 = prev,
# User6 = clear-bond (BT_CLR), User7 = output-toggle (OUT_TOG).
# The MEDIA layer keymap below hard-codes these positions.
# ----------------------------------------------------------------------------
[rmk]
ble_profiles_num = 4

# Idle auto-sleep: after this many seconds with no key/pointing activity the
# split CENTRAL drops its BLE PHY/conn params and sleeps to save battery;
# any keypress wakes it. 0 = disabled (RMK default). 300 = 5 minutes.
split_central_sleep_timeout_seconds = 300

# ----------------------------------------------------------------------------
# On-chip flash storage, default settings (empty table = enabled, defaults).
# This is what makes things SURVIVE POWER-OFF: Vial live-remaps, BLE bonds,
# and the currently selected BLE profile. Without it, every battery swap
# would forget your pairings and any remapping done in vial.rocks.
# ----------------------------------------------------------------------------
[storage]
# !!! TEMPORARY WIPE FLAG — REVERT AFTER ONE BOOT !!!
# clear_storage = true erases ALL storage on EVERY boot: split pairing state,
# host BLE bonds, Vial remaps, selected profile. Recovery procedure:
#   1. build both halves with this flag ON, flash BOTH halves
#   2. power both on once, wait for the halves to link (X -> check mark)
#   3. DELETE this flag (or set false), rebuild both, reflash BOTH halves
# If you leave it on, every battery swap forgets all pairings.
# clear_layout = true  (resets ONLY stored keymap to compiled default; bonds kept)
# clear_storage = true

# ----------------------------------------------------------------------------
# Bluetooth (host side) + battery reporting.
#
# battery_adc_pin = "vddh": the nRF52840 measures its own supply rail through
# an internal divider — no external wiring. The two adc_divider_* numbers
# calibrate that reading back to real battery voltage
# (V_batt = reading * total / measured); 2000/2806 matches the nice!nano v2.
# The result is the battery % your OS shows for the keyboard.
#
# default_tx_power: radio transmit power in dBm. 8 = nRF52840 maximum
# (same as ZMK CONFIG_BT_CTLR_TX_PWR_PLUS_8). Real-world: fewer dropped
# keystrokes / more range, at a small battery cost. Lower (0, -4) to trade
# reliability for battery life.
#
# NOTE on pairing: while a profile is BONDED to one computer it is INVISIBLE
# to every other computer. To move a profile to a new machine: select it
# (User0-3 on MEDIA), press User6 to clear its bond, then pair fresh.
# ----------------------------------------------------------------------------
[ble]
enabled = true
battery_adc_pin = "vddh"
adc_divider_measured = 2000
adc_divider_total = 2806
default_tx_power = 8

# ----------------------------------------------------------------------------
# Vial security. Dangerous operations (rewriting the keymap over USB) require
# proving you physically own the board: while vial.rocks shows the unlock
# prompt, HOLD the two LEFT THUMB keys — electrical positions (3,3) and (3,4)
# in the matrix_map below — until the progress bar completes.
# ----------------------------------------------------------------------------
[host]
unlock_keys = [[3, 3], [3, 4]]

# ----------------------------------------------------------------------------
# ELECTRICAL matrix vs. PHYSICAL keys — two views of the same board.
#
#   Physical (what you see):    3 rows x 12 finger keys  +  3+3 thumb keys
#   Electrical (how it's wired): 4 rows x 12 cols = 48 scan positions
#
# These do NOT conflict. The Corne PCB scans 4 row pins x 6 col pins per
# half (= 4x12 combined), and the THUMB KEYS ARE ELECTRICAL ROW 3 — they
# don't get a separate "thumb row", they're wired into the 4th scan row at
# columns 3-8. So `rows = 4` / `cols = 12` below describe the WIRING and
# must never be changed to 3; with rows = 3 the thumbs would never scan.
#
# matrix_map is the filter from 48 wired positions down to the 40 keys THIS
# LAYOUT USES: note its shape below — two rows of 12 (outer pinky columns 0
# and 11 mapped on the top two rows: Hyper on row 0, Meh on row 1), one row
# of 10, then one row of 6 thumbs. The bottom-row outer positions (2,0)/(2,11)
# remain INTENTIONALLY UNMAPPED — pressing them does nothing. Thumb columns
# 0-2 / 9-11 have no switches at all. To map the remaining pair: add (2,0,L)
# and (2,11,R) to matrix_map and one token per new key in every
# [[layer]].keys block.
#
# matrix_map also fixes the READING ORDER: the Nth token in every
# [[layer]].keys block below binds to the Nth (row,col) entry here.
#
# The ,L / ,R tag marks which HAND each key belongs to. It exists solely to
# power `unilateral_tap` in the HRM profile below: the firmware can only
# treat "next key came from the OTHER hand" as chord evidence if it knows
# which hand each key is on.
#
# layers = 8 reserves 8 keymap layers (0-7, all defined below). More layers
# = more RAM/flash, so it matches exactly what we use.
# ----------------------------------------------------------------------------
[layout]
rows = 4
cols = 12
layers = 8
matrix_map = """
(0,0,L) (0,1,L) (0,2,L) (0,3,L) (0,4,L) (0,5,L)   (0,6,R) (0,7,R) (0,8,R) (0,9,R) (0,10,R) (0,11,R)
(1,0,L) (1,1,L) (1,2,L) (1,3,L) (1,4,L) (1,5,L)   (1,6,R) (1,7,R) (1,8,R) (1,9,R) (1,10,R) (1,11,R)
(2,1,L) (2,2,L) (2,3,L) (2,4,L) (2,5,L)   (2,6,R) (2,7,R) (2,8,R) (2,9,R) (2,10,R)
                (3,3,L) (3,4,L) (3,5,L)   (3,6,R) (3,7,R) (3,8,R)
"""

# ============================================================================
# KEYMAP — 8 layers total, indexed 0-7.
#   Layers 0-6 = the seven TYPING layers (Miryoku-style: BASE + six hold-layers).
#   Layer 7    = DISPOFF, not a typing layer: fully transparent, exists only as
#                a flag the OLED renderers check to blank the screens.
# Layers 1-6 activate by HOLDING a thumb key; TAPPING the same key sends its
# letter/action. Notation used below:
#
#   MT(key, mod, PROFILE) — Mod-Tap: ONE key, TWO meanings, decided by how
#       long you press it.
#         quick press+release           -> types `key`
#         press and KEEP HOLDING, then
#         press something else          -> acts as held `mod` for the chord
#       Example: MT(F, LShift, HRM). Tap F -> "f". Hold F + tap J -> "J".
#       The letter is NEVER sent when it resolves as hold, and the mod is
#       NEVER sent when it resolves as tap — it's one or the other.
#       PROFILE names a [behavior.morse.profiles] entry (bottom of file)
#       that tunes HOW the tap-vs-hold decision is made.
#   LT(n, key, PROFILE) — Layer-Tap: same tap-vs-hold idea, but hold gives
#       you LAYER n (only while held) instead of a modifier.
#       Example: LT(1, Space, TL). Tap -> space. Hold + tap K -> Up arrow
#       (K on layer 1/NAV). Release the thumb -> back to normal typing.
#   WM(key, mods) — key With Modifiers: NOT dual-role, no timing, no
#       decision. The moment you press it, it sends `key` with `mods`
#       already applied — a canned shortcut on a single key.
#       Example: WM(C, LGui) = Cmd+C (copy) in one keypress.
#       Combine mods with |: WM(Z, LGui | LShift) = Cmd+Shift+Z (redo).
#       Rule of thumb: MT/LT = "this key BECOMES a mod/layer when held";
#       WM = "this key PRESSES a finished shortcut for me".
#   SHIFTED(key)           the shifted symbol, e.g. SHIFTED(Kc1) = !
#   Kc0..Kc9 — the plain DIGIT keys, exactly as if you pressed 1..0 on the
#       number row of a normal keyboard. "Kc" is just RMK's prefix for
#       "keycode": a bare `1` wouldn't be a valid name in the keymap, so the
#       digit keycodes are spelled Kc1, Kc2, ... Kc0.
#       They are NOT the numpad digits (those would be Kp1..Kp0) — apps and
#       OS shortcuts treat number-row and numpad keys differently, and these
#       send the number-row version. Shift applies as usual, which is why
#       SHIFTED(Kc1) = ! on the SYM layer.
#   TG(n)                  Toggle layer n on/off (stays until toggled again).
#   User0..User7           RMK Bluetooth controls — see ble_profiles_num above.
#   No                     dead key: on THIS layer the position does nothing.
#   _______                transparent: falls through to the layer below.
#
# TERMINOLOGY used throughout this file:
#   "chord" — two or more keys held AT THE SAME TIME on purpose, the way
#       you press Ctrl+C: hold one key, tap another while it's down. In
#       this file "chord" always means you INTENDED the dual-role key as a
#       hold (mod/layer) plus a companion key. Its opposite is a "roll":
#       keys overlapping by ACCIDENT during fast normal typing — e.g. "ds"
#       typed so fast that D is still down when S goes down. Telling
#       chords from rolls is the entire job of the tap-hold tuning section
#       at the bottom of this file.
#   "HRM" — Home-Row Mods: the resting keys A/S/D/F and J/K/L/' double as
#       GUI/Alt/Ctrl/Shift when HELD and type their letter when TAPPED, so
#       your fingers never leave the home row to reach a modifier. HRM is
#       also the NAME of the tuning profile those keys reference (see
#       [behavior.morse.profiles] below).
# ============================================================================

# Layer 0 — BASE. QWERTY with GACS home-row mods: resting fingers double as
# GUI/Alt/Ctrl/Shift (A/S/D/F), mirrored on J/K/L/'. Tap = letter, hold = mod;
# the feel is tuned by the HRM profile at the bottom of this file.
# Thumb row (hold): Escape=MEDIA  Space=NAV  Tab=MOUSE | Enter=SYM  Backspace=NUM  Delete=FUN
# Outer pinky columns: row 0 (beside Q/P) = HYPER (Cmd+Ctrl+Alt+Shift), row 1
# (beside A/') = MEH (Cmd+Ctrl+Alt). Hold-only (tap does nothing), TLI profile
# so the mods engage the instant a companion key goes down.
[[layer]]
name = "BASE"
keys = """
MT(No, LGui | LCtrl | LAlt | LShift, TLI) Q                W                E                R                T                    Y                U                I                O                P                MT(No, LGui | LCtrl | LAlt | LShift, TLI)
MT(No, LGui | LCtrl | LAlt, TLI) MT(A, LGui, HRM) MT(S, LAlt, HRM) MT(D, LCtrl, HRM) MT(F, LShift, HRM) G                 H                MT(J, RShift, HRM) MT(K, RCtrl, HRM) MT(L, RAlt, HRM) MT(Quote, RGui, HRM) MT(No, LGui | LCtrl | LAlt, TLI)
Z                X                C                V                B                    N                M                Comma            Dot              Slash
                                  LT(3, Escape, TL) LT(1, Space, TL) LT(6, Tab, TL)      LT(4, Enter, TLI) LT(2, Backspace, TLI) LT(5, Delete, TL)
"""

# Layer 1 — NAV (hold SPACE). Vim-style arrows on the right home row (HJKL
# positions), Home/End on the top-right row, PgDn/PgUp below the arrows.
# Top-left row (Q/W/E/R/T) is unused/free. Left home row pre-holds plain GACS
# mods so e.g. Space+LShift+Right selects text word-by-word without leaving
# the layer.
[[layer]]
name = "NAV"
keys = """
_______ No   No   No   No   No                        No        End       Home      No        CapsLock _______
_______ LGui LAlt LCtrl LShift No                     Left      Down      Up        Right     CapsWordToggle _______
No   No   No   No   No                        No        PageDown  PageUp    No        Insert
               No   No   No                   Enter     Backspace Delete
"""

# Layer 2 — NUM (hold BACKSPACE). Columnar numpad on the LEFT hand
# (789 / 456 / 123, 0 on the thumb) with brackets/symbols on the outer
# columns. Right home row holds mirror mods so number+modifier chords work.
# KcN = plain number-row digit N (see legend above), not a numpad key.
[[layer]]
name = "NUM"
keys = """
_______ LeftBracket Kc7 Kc8 Kc9 RightBracket          No No No No No _______
_______ Semicolon   Kc4 Kc5 Kc6 Equal                 No RShift RCtrl RAlt RGui _______
Grave       Kc1 Kc2 Kc3 Backslash             No No No No No
                Dot Kc0 Minus                 No No No
"""

# Layer 3 — MEDIA (hold ESCAPE). Volume/brightness/media transport plus all
# Bluetooth management (see ble_profiles_num for the User* decoding):
#   User4 = next BT profile              User5 = previous BT profile
#   User2-3 = select BT profile 2-3       User6 = clear bond of CURRENT profile
#   User7   = toggle output USB <-> BLE   User9 = clear bonds of ALL profiles
#   TG(7)   = blank both OLEDs (see layer 7)
# Y key: WM(Q, LCtrl|LGui) = lock screen (macOS).
[[layer]]
name = "MEDIA"
keys = """
_______ No   No   No   No   No                        WM(Q, LCtrl | LGui) BrightnessDown BrightnessUp User6 User9 _______
_______ LGui LAlt LCtrl LShift No                      TG(7)        AudioVolDown   AudioVolUp   User0          User1 _______
No   No   No   No   No                         User7        MediaNextTrack MediaPrevTrack User2         User3
               No   No   No                    MediaStop    MediaPlayPause AudioMute
"""

# Layer 4 — SYM (hold ENTER). Exactly the NUM layer with SHIFT applied:
# same finger positions produce the shifted symbol ({ & * ( } etc.), so your
# muscle memory for numbers and their symbols is identical.
[[layer]]
name = "SYM"
keys = """
_______ SHIFTED(LeftBracket) SHIFTED(Kc7) SHIFTED(Kc8) SHIFTED(Kc9) SHIFTED(RightBracket)   No No No No No _______
_______ SHIFTED(Semicolon)   SHIFTED(Kc4) SHIFTED(Kc5) SHIFTED(Kc6) SHIFTED(Equal)          No RShift RCtrl RAlt RGui _______
SHIFTED(Grave)       SHIFTED(Kc1) SHIFTED(Kc2) SHIFTED(Kc3) SHIFTED(Backslash)      No No No No No
                     SHIFTED(Kc9) SHIFTED(Kc0) SHIFTED(Minus)                       No No No
"""

# Layer 5 — FUN (hold DELETE). F-keys in the same columnar shape as NUM
# (F7-F9 / F4-F6 / F1-F3, F10-F12 on the outer column) + macOS region
# screenshot to file (Cmd+Shift+4) on the right edge of the left hand.
# G position freed (no binding).
[[layer]]
name = "FUN"
keys = """
_______ F12 F7 F8 F9 WM(Kc4, LShift | LGui)             No No No No No _______
_______ F11 F4 F5 F6 No                                 No RShift RCtrl RAlt RGui _______
F10 F1 F2 F3 No                                 No No No No No
           Menu Space Tab                       No No No
"""

# Layer 6 — MOUSE (hold TAB). Pointer movement on the right home row (same
# HJKL directions as NAV arrows), scroll wheel below, buttons on the thumbs.
# Left thumb cluster adds MouseBtn4/MouseBtn5 (Back/Forward) for browser &
# Finder history nav, mirroring the LMB/MMB/RMB cluster on the right thumbs.
# ZMK button order LCLK/MCLK/RCLK maps to RMK Btn1/Btn3/Btn2.
[[layer]]
name = "MOUSE"
keys = """
_______ No   No   No   No   No                          No             No             No             No             No _______
_______ LGui LAlt LCtrl LShift No                        MouseLeft      MouseDown      MouseUp        MouseRight     No _______
No   No   No   No   No                           MouseWheelLeft MouseWheelDown MouseWheelUp   MouseWheelRight No
               MouseBtn4 MouseBtn5 No             MouseBtn1      MouseBtn3      MouseBtn2
"""

# Layer 7 — DISPOFF (toggled by TG(7) on MEDIA). Fully transparent, so every
# key still falls through and types normally; its ONLY purpose is to signal
# both OLED renderers (they check ctx.layer == 7) to blank the screens.
# Toggle TG(7) again to restore the displays.
[[layer]]
name = "DISPOFF"
keys = """
_______ _______ _______ _______ _______ _______        _______ _______ _______ _______ _______ _______
_______ _______ _______ _______ _______ _______        _______ _______ _______ _______ _______ _______
_______ _______ _______ _______ _______        _______ _______ _______ _______ _______
                _______ _______ _______         _______ _______ _______
"""

# ============================================================================
# TAP-HOLD ("morse") TUNING — the feel of home-row mods and thumb layer-taps.
#
# Every dual-role key needs an answer to: "was that a TAP (letter) or a HOLD
# (modifier/layer)?" Four knobs decide it; here's each one in real typing
# terms:
#
# hold_timeout = 100ms
#   The press-and-wait threshold. Press a dual key ALONE and keep it down
#   past 100ms -> hold (mod/layer). Release sooner -> tap (letter).
#   Lower = mods fire faster but fast typing misfires more; higher = safer
#   typing but you must consciously wait longer for a chord.
#
# enable_flow_tap + prior_idle_time = 80ms   ("am I mid-word?")
#   If ANY other key was pressed less than 80ms before a dual key goes
#   down, the firmware decides TAP instantly — no waiting, no misfire.
#   This is the main defence against rolls like "ds" firing Ctrl mid-word,
#   and cross-hand rolls like "an" firing Cmd+N.
#   Consequence: to USE a home-row mod you must pause >=80ms first —
#   which you naturally do before a deliberate shortcut like Ctrl+C.
#   Tuned for ~87 WPM (~138ms between keystrokes): lowered 120ms -> 100ms ->
#   90ms because deliberate chords (Ctrl via D) kept resolving as letters,
#   then raised to 150ms because 90ms sat below the ~138ms average
#   inter-keystroke gap, then dropped back to 80ms by explicit choice.
#   80ms sits below the average inter-keystroke gap, so fast rolls may
#   escape flow-tap and misfire as mods again — if that happens, raise it.
#   NOTE: prior_idle_time is GLOBAL (this top-level table only); profiles
#   can switch flow-tap on/off but all share this 80ms window.
#
# permissive_hold (per-profile below)   ("nested press = intentional chord")
#   While the dual key is down, if another key is pressed AND RELEASED
#   before you let go, resolve HOLD immediately — even before 100ms.
#   Typing "F(down) J(down) J(up) F(up)" quickly = Shift+J. This is what
#   makes deliberate chords feel instant instead of laggy.
#
# unilateral_tap (HRM only)   ("same hand = typing, other hand = chord")
#   A hold decision is only honoured when the companion key is on the
#   OPPOSITE hand (that's what the L/R tags in matrix_map feed). Same-hand
#   sequences like "ds", "as", "lo" always resolve as letters. Cost: you
#   can't do a same-hand chord like Ctrl(D)+S — use the mirror mod on the
#   other hand instead (that's why both hands have full GACS).
#
# gap_timeout = 200ms
#   Window for multi-step morse patterns (tap-then-hold, double-tap) on keys
#   that define them. Pure MT()/LT() keys define only TAP and HOLD, so this
#   is INERT here.
#   Letter auto-repeat on dual keys depends on WHEN you press:
#   - mid-streak (within the 80ms flow-tap window): the letter's press is
#     sent and held while the key is down -> OS auto-repeat works ("dddd...").
#   - after a pause (>=80ms idle): holding resolves as mod/layer at 100ms —
#     no letter repeat. To repeat a home-row letter, keep it inside a streak.
#
# Profiles — referenced by name in MT(...)/LT(...) above:
#
# HRM (home-row mods): flow-tap ON + permissive-hold + unilateral_tap.
#   Biased hard toward "it's a letter" — all three guards must agree it was
#   a chord before a modifier fires.
#
# TL (Space/Escape/Tab/Delete layer-taps): flow-tap OFF, permissive-hold.
#   Flow-tap must stay OFF here: you hold Space for NAV *mid-typing-streak*
#   (type, arrow over, keep typing). With flow-tap on, that hold would be
#   forced into a literal space. Permissive-hold keeps the layer instant
#   (Space(down) H(down) H(up) = Left arrow) while protecting the very
#   common fast roll "space -> letter" from misfiring as NAV.
#   Per-profile flow-tap override is the reason rmk is pinned/vendored at
#   b9820492 — do not "simplify" the profiles into one.
#
# TLI (Enter=SYM and Backspace=NUM only — the character-entry layers):
#   hold_on_other_press — the layer activates THE INSTANT any other key
#   goes down while the thumb is held. No release-order requirement, no
#   100ms wait: Bspc(down) D(down) is already NUM, so D = 5 even if the
#   thumb lifts first (the rolled release that made 5 come out as "d"
#   under permissive-hold). Known trade-off, accepted deliberately: a fast
#   tap-then-letter roll on these two thumbs misfires as a layer key
#   (Bspc(down) E(down) Bspc(up) -> NUM -> "8"; Enter(down) T(down) ->
#   SYM -> "}"). Escape/Tab/Delete stay on TL: MEDIA/MOUSE/FUN misfires
#   are rarer and permissive-hold is the safer default there. Keep Space
#   on TL or fast "space then letter" rolls would eat the letter as NAV.
# ============================================================================
[behavior.morse]
enable_flow_tap = true
prior_idle_time = "80ms"
hold_timeout = "100ms"
gap_timeout = "200ms"

[behavior.morse.profiles]
HRM = { enable_flow_tap = true, permissive_hold = true, unilateral_tap = true, hold_timeout = "100ms", gap_timeout = "200ms" }
TL = { enable_flow_tap = false, permissive_hold = true, hold_timeout = "100ms", gap_timeout = "200ms" }
TLI = { enable_flow_tap = false, hold_on_other_press = true, hold_timeout = "100ms", gap_timeout = "200ms" }

# ============================================================================
# SPLIT — how the two halves relate. The halves talk to each other over BLE;
# only the central talks to your computer.
# ============================================================================
[split]
connection = "ble"

# ----------------------------------------------------------------------------
# LEFT half = central. Owns the keymap, hosts Vial, connects to the computer.
#
# row_offset/col_offset = 0: this half's 4x6 local matrix occupies columns
# 0-5 of the full 4x12 matrix.
#
# ble_addr: FIXED static random Bluetooth address. The two halves find each
# other by these hard-coded addresses (no discovery/pairing dance between
# halves). Must be unique per half; change one and the halves stop talking
# until both are reflashed with matching firmware.
#
# Battery ADC settings repeat here because each half measures its OWN battery.
# ----------------------------------------------------------------------------
[split.central]
rows = 4
cols = 6
row_offset = 0
col_offset = 0
ble_addr = [0x18, 0xe2, 0x21, 0x80, 0xc0, 0xc7]
battery_adc_pin = "vddh"
adc_divider_measured = 2000
adc_divider_total = 2806

# Physical wiring of the left half.
#   matrix_type "normal" = classic row/col diode matrix (vs "direct_pin").
#   debouncer "fast" = eager per-key debouncer: reports the keypress on the
#     first clean edge and ignores contact chatter afterwards — lower latency
#     than the default deferred debouncer. If you ever see doubled letters
#     from a worn switch, switching back to the default is the fix.
#   Pins: cols pro_micro 21,20,19,18,15,14 -> P0_31,P0_29,P0_02,P1_15,P1_13,P1_11
#     (ZMK corne shield mapping, verified 1:1).
[split.central.matrix]
matrix_type = "normal"
debouncer = "fast"
row_pins = ["P0_22", "P0_24", "P1_00", "P0_11"]
col_pins = ["P0_31", "P0_29", "P0_02", "P1_15", "P1_13", "P1_11"]

# Central OLED status screen — SSD1306 128x32, mounted portrait (short/32px
# edge faces user). rotation=90 turns it into a 32x128 drawing surface for
# the custom renderer in src/status.rs. If content renders upside-down on
# your mount, use rotation=270.
# No render_interval on purpose: all redraws are event-driven (layer change,
# BLE state, WPM, battery), so the screen costs zero battery while idle.
[split.central.display]
driver = "ssd1306"
size = "128x32"
rotation = 90
renderer = "crate::status::StatusRenderer"

# I2C bus for the central OLED: hardware TWISPI0 peripheral, standard
# nice!nano display pins (P0.17 = SDA, P0.20 = SCL).
[split.central.display.protocol.i2c]
instance = "TWISPI0"
sda = "P0_17"
scl = "P0_20"

# ----------------------------------------------------------------------------
# RIGHT half = peripheral. Sends its key events to the central over BLE;
# never talks to the computer directly.
#
# col_offset = 6: its local columns 0-5 land in columns 6-11 of the full
# matrix. Note the col_pins order is REVERSED vs the left half — the right
# half of a Corne is a mirror image, so pro_micro 14,15,18,19,20,21 ->
# P1_11,P1_13,P1_15,P0_02,P0_29,P0_31 keeps electrical col 6 at the inner edge.
# ----------------------------------------------------------------------------
[[split.peripheral]]
rows = 4
cols = 6
row_offset = 0
col_offset = 6
ble_addr = [0x7e, 0xfe, 0x73, 0x9e, 0x66, 0xe3]
battery_adc_pin = "vddh"
adc_divider_measured = 2000
adc_divider_total = 2806

# Physical wiring of the right half — same rows, mirrored columns (see above).
[split.peripheral.matrix]
matrix_type = "normal"
debouncer = "fast"
row_pins = ["P0_22", "P0_24", "P1_00", "P0_11"]
col_pins = ["P1_11", "P1_13", "P1_15", "P0_02", "P0_29", "P0_31"]

# Right half (peripheral) OLED — SSD1306 128x32, portrait like the left.
# This one runs the decorative renderer in src/trishul.rs, so unlike the
# central it needs a timer: render_interval = 400ms drives the idle
# animation tick (breathing, equalizer). The render loop gates on !sleeping,
# so there is zero cost while the half is asleep.
# Tune: lower to 120-160 for smoother bars; raise to 800 to save battery.
[split.peripheral.display]
driver = "ssd1306"
size = "128x32"
rotation = 90
renderer = "crate::trishul::TrishulRenderer"
render_interval = 400

# I2C bus for the peripheral OLED — same pins as the left (each half has its
# own independent I2C bus and display).
[split.peripheral.display.protocol.i2c]
instance = "TWISPI0"
sda = "P0_17"
scl = "P0_20"
